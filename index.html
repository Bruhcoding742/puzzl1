
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); color: var(--color-text-primary); }
#app { padding: 1.5rem 0; max-width: 640px; margin: 0 auto; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
input[type=text], textarea, select { width: 100%; font-family: var(--font-sans); font-size: 14px; }
textarea { resize: vertical; min-height: 60px; }
button { cursor: pointer; font-family: var(--font-sans); font-size: 14px; }
.btn { padding: 8px 16px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.btn-primary:hover { opacity: 0.85; }
.btn-danger { color: var(--color-text-danger); border-color: var(--color-border-danger); }
.btn-danger:hover { background: var(--color-background-danger); }
.badge { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: var(--border-radius-md); font-weight: 500; }
.badge-success { background: var(--color-background-success); color: var(--color-text-success); }
.badge-danger { background: var(--color-background-danger); color: var(--color-text-danger); }
.badge-info { background: var(--color-background-info); color: var(--color-text-info); }
.answer-btn { width: 100%; text-align: left; padding: 10px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 15px; margin-bottom: 8px; transition: background 0.15s; }
.answer-btn:hover:not(:disabled) { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
.answer-btn.correct { background: var(--color-background-success); border-color: var(--color-border-success); color: var(--color-text-success); }
.answer-btn.wrong { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
.answer-btn.reveal { background: var(--color-background-success); border-color: var(--color-border-success); color: var(--color-text-success); opacity: 0.6; }
.q-item { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.q-item:last-child { border-bottom: none; }
.progress-bar { height: 6px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; margin-bottom: 1rem; }
.progress-fill { height: 100%; background: var(--color-text-primary); border-radius: 3px; transition: width 0.3s; }
.tab-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.tab { padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); font-size: 14px; cursor: pointer; }
.tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
</style>

<div id="app"></div>

<script>
let state = {
  tab: 'play',
  questions: [
    { q: 'What is the capital of France?', answers: ['London','Paris','Berlin','Madrid'], correct: 1 },
    { q: 'How many sides does a hexagon have?', answers: ['5','6','7','8'], correct: 1 },
    { q: 'What planet is closest to the Sun?', answers: ['Venus','Earth','Mercury','Mars'], correct: 2 },
  ],
  quiz: null,
  editingIdx: null,
  newQ: { q: '', answers: ['','','',''], correct: 0 },
};

function startQuiz() {
  if (!state.questions.length) return;
  state.quiz = { idx: 0, score: 0, answered: null, done: false };
  render();
}

function answer(i) {
  if (state.quiz.answered !== null) return;
  const q = state.questions[state.quiz.idx];
  const correct = i === q.correct;
  state.quiz.answered = i;
  if (correct) state.quiz.score++;
  render();
}

function next() {
  const nxt = state.quiz.idx + 1;
  if (nxt >= state.questions.length) {
    state.quiz.done = true;
  } else {
    state.quiz.idx = nxt;
    state.quiz.answered = null;
  }
  render();
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const tabs = document.createElement('div');
  tabs.className = 'tab-row';
  ['play','manage','edit'].forEach(t => {
    const b = document.createElement('button');
    b.className = 'tab' + (state.tab === t ? ' active' : '');
    b.textContent = t === 'play' ? 'Play' : t === 'manage' ? `Questions (${state.questions.length})` : (state.editingIdx !== null ? 'Edit question' : 'Add question');
    b.onclick = () => { state.tab = t; if (t !== 'edit') cancelEdit(); render(); };
    tabs.appendChild(b);
  });
  app.appendChild(tabs);

  if (state.tab === 'play') renderPlay(app);
  else if (state.tab === 'manage') renderManage(app);
  else renderEdit(app);
}

function renderPlay(app) {
  if (!state.quiz || state.quiz.done === undefined) {
    const card = document.createElement('div');
    card.className = 'card';
    if (!state.questions.length) {
      card.innerHTML = '<p style="color:var(--color-text-secondary);font-size:15px;">No questions yet. Add some in the <strong>Add question</strong> tab.</p>';
    } else {
      card.innerHTML = `
        <p style="font-size:15px;color:var(--color-text-secondary);margin-bottom:1rem;">${state.questions.length} question${state.questions.length !== 1 ? 's' : ''} ready.</p>
        <button class="btn btn-primary" id="startBtn">Start quiz</button>
      `;
    }
    app.appendChild(card);
    const btn = document.getElementById('startBtn');
    if (btn) btn.onclick = startQuiz;
    return;
  }

  if (state.quiz.done) {
    const pct = Math.round(state.quiz.score / state.questions.length * 100);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:.5rem;">Quiz complete</p>
      <p style="font-size:28px;font-weight:500;margin-bottom:.25rem;">${state.quiz.score} / ${state.questions.length}</p>
      <p style="font-size:14px;color:var(--color-text-secondary);margin-bottom:1.25rem;">${pct}% correct</p>
      <button class="btn btn-primary" id="againBtn">Play again</button>
    `;
    app.appendChild(card);
    document.getElementById('againBtn').onclick = startQuiz;
    return;
  }

  const q = state.questions[state.quiz.idx];
  const prog = document.createElement('div');
  prog.className = 'progress-bar';
  prog.innerHTML = `<div class="progress-fill" style="width:${(state.quiz.idx / state.questions.length) * 100}%"></div>`;
  app.appendChild(prog);

  const meta = document.createElement('div');
  meta.style = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;';
  meta.innerHTML = `<span style="font-size:13px;color:var(--color-text-secondary);">Question ${state.quiz.idx + 1} of ${state.questions.length}</span><span style="font-size:13px;color:var(--color-text-secondary);">Score: ${state.quiz.score}</span>`;
  app.appendChild(meta);

  const card = document.createElement('div');
  card.className = 'card';
  const qText = document.createElement('p');
  qText.style = 'font-size:17px;font-weight:500;margin-bottom:1.25rem;line-height:1.4;';
  qText.textContent = q.q;
  card.appendChild(qText);

  q.answers.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = a;
    btn.disabled = state.quiz.answered !== null;
    if (state.quiz.answered !== null) {
      if (i === q.correct && state.quiz.answered !== q.correct) btn.classList.add('reveal');
      if (i === state.quiz.answered && i === q.correct) btn.classList.add('correct');
      if (i === state.quiz.answered && i !== q.correct) btn.classList.add('wrong');
    }
    btn.onclick = () => answer(i);
    card.appendChild(btn);
  });

  if (state.quiz.answered !== null) {
    const row = document.createElement('div');
    row.style = 'display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;';
    const badge = document.createElement('span');
    badge.className = 'badge ' + (state.quiz.answered === q.correct ? 'badge-success' : 'badge-danger');
    badge.textContent = state.quiz.answered === q.correct ? 'Correct' : 'Incorrect';
    row.appendChild(badge);
    const nb = document.createElement('button');
    nb.className = 'btn btn-primary';
    nb.textContent = state.quiz.idx + 1 < state.questions.length ? 'Next' : 'Finish';
    nb.onclick = next;
    row.appendChild(nb);
    card.appendChild(row);
  }

  app.appendChild(card);
}

function renderManage(app) {
  const card = document.createElement('div');
  card.className = 'card';
  if (!state.questions.length) {
    card.innerHTML = '<p style="color:var(--color-text-secondary);font-size:14px;">No questions yet.</p>';
  } else {
    state.questions.forEach((q, i) => {
      const row = document.createElement('div');
      row.className = 'q-item';
      const info = document.createElement('div');
      info.style = 'flex:1;min-width:0;';
      info.innerHTML = `<p style="font-size:14px;font-weight:500;margin-bottom:3px;">${q.q}</p><p style="font-size:12px;color:var(--color-text-secondary);">Answer: ${q.answers[q.correct]}</p>`;
      const btns = document.createElement('div');
      btns.style = 'display:flex;gap:6px;flex-shrink:0;';
      const eb = document.createElement('button');
      eb.className = 'btn';
      eb.style = 'font-size:12px;padding:5px 10px;';
      eb.textContent = 'Edit';
      eb.onclick = () => editQ(i);
      const db = document.createElement('button');
      db.className = 'btn btn-danger';
      db.style = 'font-size:12px;padding:5px 10px;';
      db.textContent = 'Delete';
      db.onclick = () => { deleteQ(i); };
      btns.appendChild(eb);
      btns.appendChild(db);
      row.appendChild(info);
      row.appendChild(btns);
      card.appendChild(row);
    });
  }
  app.appendChild(card);
}

function renderEdit(app) {
  const card = document.createElement('div');
  card.className = 'card';

  const al = document.createElement('p');
  al.className = 'label';
  al.textContent = 'Answer choices — select the correct one';
  al.style = 'margin-bottom:8px;';
  card.appendChild(al);

  state.newQ.answers.forEach((a, i) => {
    const row = document.createElement('div');
    row.style = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'correct';
    radio.checked = state.newQ.correct === i;
    radio.onchange = () => { state.newQ.correct = i; render(); };
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = a;
    inp.placeholder = `Choice ${i + 1}`;
    inp.oninput = e => { state.newQ.answers[i] = e.target.value; };
    inp.style = 'flex:1;';
    row.appendChild(radio);
    row.appendChild(inp);
    card.appendChild(row);
  });

  const btnRow = document.createElement('div');
  btnRow.style = 'display:flex;gap:8px;margin-top:1rem;';
  const save = document.createElement('button');
  save.className = 'btn btn-primary';
  save.textContent = state.editingIdx !== null ? 'Save changes' : 'Add question';
  save.onclick = saveNew;
  btnRow.appendChild(save);
  if (state.editingIdx !== null) {
    const cancel = document.createElement('button');
    cancel.className = 'btn';
    cancel.textContent = 'Cancel';
    cancel.onclick = () => { cancelEdit(); state.tab = 'manage'; render(); };
    btnRow.appendChild(cancel);
  }
  card.appendChild(btnRow);
  app.appendChild(card);
}

render();
</script>
